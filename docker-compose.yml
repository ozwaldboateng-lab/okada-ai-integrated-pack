version: "3.9"
# Local kernel-only shortcut. The preferred integrated stack is:
# ops/integrated/docker-compose.kernel-gateway-ui.yml
services:
  okada-kernel-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "pip install -e .[dev] &&
      uvicorn app.main:app --app-dir apps/okada-kernel-service --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    environment:
      OKADA_AUDIT_DIR: /app/data/audit
      OKADA_DEFAULT_POLICY: default

spec_id: OKD-AI-CORE-009
name: Fixture Suite Builder
status: draft
layer: auto_calibration_core
purpose: >-
  Generate replayable calibration lab suites from recent operational logs,
  calibration windows, or inline window records.
responsibilities:
  - resolve source records from inline windows, window requests, or audit history
  - select bounded subsets via suite-build strategy
  - derive calibration lab cases and baseline actions
  - persist generated suites and update suite manifest
  - record build history for auditability
inputs:
  - profile_name
  - spec_id
  - adapter_type
  - window_records
  - window_request
  - use_recent_audits
  - audit_limit
  - max_cases
  - strategy
outputs:
  - suite_name
  - fixture_path
  - summary
  - preview_cases
history:
  - build history JSONL
constraints:
  - generated suites are provisional replay assets
  - overwrite must be explicit
acceptance:
  - suite file is generated
  - manifest entry is updated
  - generated suite can be replayed by calibration lab
